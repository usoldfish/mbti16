name: Expire temporary UCS report

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  remove-after-expiry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove expired report
        shell: bash
        run: |
          set -euo pipefail
          NOW=$(date -u +%s)
          EXPIRES=$(date -u -d '2026-07-26T13:08:56Z' +%s)
          if [ "$NOW" -lt "$EXPIRES" ]; then
            echo "Report has not expired yet."
            exit 0
          fi
          rm -rf private/ucs-7d-68145bb1b9
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Report already removed."
            exit 0
          fi
          git commit -m "Remove expired temporary UCS report"
          git push
