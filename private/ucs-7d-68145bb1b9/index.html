function expiredView() {
  document.getElementById('app').innerHTML =
    '<div class="expired"><span class="mark">ACCESS EXPIRED</span><h1>页面已失效</h1><p>该临时研究页面的7天访问期已经结束。</p></div>';
}
async function decryptReport(username, password) {
  const enc = new TextEncoder();
  const material = await crypto.subtle.importKey(
    'raw', enc.encode(username + ':' + password), 'PBKDF2', false, ['deriveKey']
  );
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:b64bytes(SALT), iterations:ITERATIONS, hash:'SHA-256'},
    material,
    {name:'AES-GCM', length:256},
    false,
    ['decrypt']
  );
  const plain = await crypto.subtle.decrypt(
    {name:'AES-GCM', iv:b64bytes(NONCE)},
    key,
    b64bytes(CIPHERTEXT)
  );
  return new TextDecoder().decode(plain);
}
if (Date.now() >= EXPIRES_AT) expiredView();
document.getElementById('login')?.addEventListener('submit', async (event) => {
  event.preventDefault();
  if (Date.now() >= EXPIRES_AT) return expiredView();
  const btn = document.getElementById('submit');
  const msg = document.getElementById('msg');
  btn.disabled = true;
  msg.className = 'msg';
  msg.textContent = '正在验证并解密…';
  try {
    const html = await decryptReport(
      document.getElementById('username').value.trim(),
      document.getElementById('password').value
    );
    msg.className = 'msg ok';
    msg.textContent = '验证成功。';
    document.open();
    document.write(html);
    document.close();
  } catch (error) {
    msg.className = 'msg err';
    msg.textContent = '用户名或密码错误。';
    btn.disabled = false;
  }
});
</script>
