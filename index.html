<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>MBTI 16型人格测试 | mbti16</title><meta name="description" content="3分钟抽出你的人格卡，完成趣味MBTI 16型人格测试并生成专属结果。"><meta name="robots" content="index,follow"><link rel="canonical" href="https://usoldfish.github.io/mbti16/"><meta property="og:title" content="我抽到了一张MBTI人格卡"><meta property="og:description" content="3分钟抽出你的16型人格卡"><meta property="og:url" content="https://usoldfish.github.io/mbti16/"><meta property="og:type" content="website"><script src="https://cdn.tailwindcss.com"></script><style>:root{--sun:#ffb627;--deep:#ff9505;--ink:#2d3142;--soft:#858b9f;--paper:#fffdf7;--line:#f0eadc}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif}button{font:inherit}.hide{display:none!important}.card{background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:0 14px 40px rgba(45,49,66,.08)}.grad{background:linear-gradient(135deg,var(--sun),var(--deep))}.btn{border:0;border-radius:999px;color:#fff;font-weight:900;padding:15px 34px;box-shadow:0 10px 28px rgba(255,149,5,.32)}.chip{border:1px solid var(--line);background:#fff;border-radius:16px}.bar{height:10px;border-radius:999px;background:#f2eadc;overflow:hidden}.fill{height:100%;border-radius:999px;background:linear-gradient(135deg,var(--sun),var(--deep));transition:width .5s}.pop{animation:pop .35s cubic-bezier(.34,1.56,.64,1)}@keyframes pop{from{transform:scale(.92);opacity:.2}to{transform:scale(1);opacity:1}}@keyframes float{50%{transform:translateY(-10px) rotate(3deg)}}.float{animation:float 3s ease-in-out infinite}.confetti{position:fixed;inset:0;pointer-events:none;z-index:20}</style></head><body><canvas id="confetti" class="confetti"></canvas><header class="sticky top-0 z-10 border-b border-[#f0eadc] bg-[#fffdf7dd] backdrop-blur"><div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-3"><a class="text-xl font-black no-underline text-[#2d3142]" href="./">MBTI<span class="text-[#ff9505]">16</span></a><a class="text-sm font-bold text-[#858b9f] no-underline" href="#types">16型人格</a></div></header><main><section id="home" class="mx-auto max-w-3xl px-5 py-14 text-center"><div class="float text-6xl">🧠</div><p class="mx-auto mt-5 inline-flex rounded-full bg-[#f5f0ff] px-4 py-2 text-sm font-black text-[#7c5ce0]">🎴 测完抽一张专属人格卡</p><h1 class="mt-5 text-4xl font-black leading-tight sm:text-6xl">3分钟<br>抽出<span class="bg-gradient-to-r from-[#ffb627] to-[#ff6b6b] bg-clip-text text-transparent">你的人格卡</span></h1><p class="mx-auto mt-5 max-w-md text-[#858b9f]">24道随机题，像打游戏一样轻松。测完开卡，看看你的人格是不是隐藏SSR。</p><button class="btn grad mt-8 cursor-pointer text-lg" onclick="start()">▶ 开始测试</button><div class="mt-8 flex flex-wrap justify-center gap-4 text-sm font-bold text-[#858b9f]"><span>⚡ 约3分钟</span><span>🎲 题目随机</span><span>🆓 免费</span></div></section><section id="types" class="mx-auto max-w-5xl px-5 pb-12"><p class="text-center text-xs font-black tracking-[.2em] text-[#858b9f]">16种人格 · 哪张是你的本命卡？</p><div id="typeGrid" class="mt-5 grid grid-cols-2 gap-3 sm:grid-cols-4"></div></section><section id="quiz" class="hide mx-auto max-w-2xl px-5 py-8"><div class="mb-4 flex items-center justify-between text-sm font-black"><span id="qno">1 / 24</span><span id="timer" class="text-[#858b9f]">0:00</span></div><div class="bar mb-6"><div id="prog" class="fill" style="width:0%"></div></div><article class="card pop p-6"><p id="qtag" class="mb-3 inline-flex rounded-full bg-[#fff1da] px-3 py-1 text-xs font-black text-[#ff9505]">Q1</p><h2 id="qtext" class="text-2xl font-black leading-snug"></h2><div id="opts" class="mt-6 grid gap-3"></div><button id="back" class="mt-5 border-0 bg-transparent text-sm font-bold text-[#858b9f]" onclick="prev()">← 返回上一题</button></article></section><section id="pack" class="hide min-h-[80vh] place-items-center px-5 text-center"> script>const TYPES={INTJ:['建筑师','🏛️','深夜运转的星图','战略大脑，把想法变为现实的幕后高手','战略思维、独立自主、决断力强、高度专注','科学研究、系统架构、战略管理','⚙️ 钢','🦉 猫头鹰',2.1],INTP:['逻辑学家','🔬','宇宙后台的程序员','好奇的发明家，沉迷于知识与逻辑之美','逻辑分析、创新思维、客观公正、强烈求知欲','科学研究、计算机科学、哲学','💨 风','🐙 章鱼',3.3],ENTJ:['指挥官','⚔️','天生的开局玩家','天生领袖，总能找到或创造解决方案','领导力、战略眼光、效率、自信、驱动力强','CEO、高管、律师、创业者','🔥 火','🦁 狮子',1.8],ENTP:['辩论家','⚡','行走的脑洞发射器','机智的思想玩家，无法抗拒智力挑战','快速思维、创新、辩论能力、魅力','创业者、律师、咨询顾问','⚡ 雷','🦊 狐狸',3.2],INFJ:['提倡者','🌟','月光下的引路人','最稀有的理想主义者，渴望让世界更好','洞察力、同理心、决断、创造力、价值观','心理咨询、作家、教师、公益','🌙 月','🦌 白鹿',1.5],INFP:['调停者','🌿','口袋里装着银河','诗意的灵魂，总能在黑暗中看见善良','同理心、创造力、开放思维、热情','作家、艺术家、心理学家','💧 水','🦋 蝴蝶',4.4],ENFJ:['主人公','👑','人间小太阳满级','魅力领袖，能点燃每个人的潜能','领导力、同理心、沟通、热情、可靠','教师、辅导员、人力资源','☀️ 日','🐬 海豚',2.5],ENFP:['竞选者','🦋','快乐的永动机','热情的自由精灵，总能找到理由微笑','热情、创造力、社交能力、乐观','记者、演员、创意总监','🌈 虹','🐿️ 松鼠',8.1],ISTJ:['物流师','📋','人形瑞士钟表','靠谱担当，说到做到的现实主义者','可靠、勤奋、有组织、诚实、意志坚定','会计、审计、行政管理','🪨 岩','🐘 大象',11.6],ISFJ:['守卫者','🛡️','行走的暖宝宝','温柔守护者，随时准备保护所爱之人','关爱、可靠、耐心、观察力、踏实','护士、教师、行政、社工','🌾 土','🐻 棕熊',13.8],ESTJ:['总经理','💼','秩序界的守门员','秩序建立者，管理万物的实干家','组织能力、可靠、直接、忠诚、耐心','业务管理、金融、军队','🏔️ 山','🐺 头狼',8.7],ESFJ:['执政官','🤝','氛围组永远的C位','社交达人，用真诚善意温暖所有人','关爱、忠诚、社交能力、可靠','教师、护士、活动策划','🌸 花','🐕 金毛',12.3],ISTP:['鉴赏家','🔧','沉默的拆解大师','冷静的实验者，万物工具的驾驭高手','逻辑、实践技能、冷静、灵活','工程师、机械师、飞行员','🗡️ 金','🐆 猎豹',5.4],ISFP:['探险家','🎨','生活美学体验官','感性艺术家，把生活过成一幅画','魅力、艺术天赋、同理心、好奇心','艺术家、设计师、音乐家','🍃 木','🦢 天鹅',8.8],ESTP:['企业家','🚀','肾上腺素收割机','行动派玩家，活在心跳加速的此刻','精力充沛、感知敏锐、直接、社交','企业家、销售、运动员','🌋 焰','🦅 雄鹰',4.3],ESFP:['表演者','🎭','自带BGM出场的人','天生的明星，把每一刻变成舞台','社交技能、热情、艺术感、实践智慧','演员、音乐家、活动策划','✨ 光','🦜 鹦鹉',7.7]};const POOL={EI:[['聚会结束后，你通常感觉…','满电！还想继续嗨','该回家充电了'],['遇到难题，你的第一反应是…','找人聊聊，集思广益','自己先想明白'],['周五晚上，你更想…','约一波人热闹热闹','窝家里追剧打游戏'],['刚认识的人面前，你…','很快就能聊熟','需要时间慢慢热'],['开会时，你通常…','有想法马上说','先记下来回头琢磨'],['灵感来了，你会…','立刻讲给别人听','先在心里养一养']],SN:[['学新东西时，你更想知道…','具体怎么操作','背后的原理是什么'],['你更相信…','摆在眼前的事实','心里冒出的直觉'],['解决问题，你更愿意…','用被验证过的老方法','试试新奇路子'],['看电影你更爱…','真实事件改编','科幻奇幻烧脑'],['组装新家具时，你…','严格按说明书来','看个大概自己琢磨'],['做菜时，你倾向于…','按菜谱精准','凭手感发挥']],TF:[['做重要决定时，你靠…','逻辑分析利弊','内心的感受'],['朋友找你哭诉，你会先…','帮TA分析怎么解决','先抱抱表示理解'],['争论时，你更在乎…','谁说得对','别伤了和气'],['提意见时，你倾向于…','直说，真话最重要','委婉点照顾感受'],['团队里你更容易当…','指出问题的人','安抚情绪的人'],['选礼物时，你更看重…','实用，TA真的需要','心意，TA会被感动']],JP:[['你的生活方式更接近…','计划控，安排明白','随心走，看心情'],['面对DDL，你通常…','提前搞定绝不拖','最后一刻爆发'],['出去旅行，你喜欢…','攻略做满行程排好','说走就走随缘'],['开始新项目，你会…','先列计划再动手','直接开干边做边改'],['临时改计划，你的反应…','烦！说好的呢','也行，说不定更好玩'],['周末安排，你喜欢…','提前定好几点干嘛','睡醒看心情决定']]};let QS=[],cur=0,ans=[],sec=0,timer=null,res='',dims=[];const $=id=>document.getElementById(id),pair={E:'I',I:'E',S:'N',N:'S',T:'F',F:'T',J:'P',P:'J'};function init(){typeGrid.innerHTML=Object.entries(TYPES).map(([c,t])=>`<button class="chip p-4 text-center" onclick="show('${c}',null)"><div class="text-3xl">${t[1]}</div><b>${c}</b><p class="text-xs text-[#858b9f]">${t[0]}</p></button>`).join('')}function shuffle(a){return [...a].sort(()=>Math.random()-.5)}function build(){return shuffle(Object.entries(POOL).flatMap(([d,arr])=>shuffle(arr).map(x=>{let a=d[0],q={d,a,text:x[0],A:x[1],B:x[2]};if(Math.random()<.5){q.A=x[2];q.B=x[1];q.a=pair[a]}return q})))}function start(){QS=build();cur=0;ans=[];sec=0;clearInterval(timer);timer=setInterval(()=>{sec++;timer.textContent=Math.floor(sec/60)+':'+String(sec%60).padStart(2,'0')},1e3);home.classList.add('hide');result.classList.add('hide');pack.classList.add('hide');quiz.classList.remove('hide');render()}function render(){let q=QS[cur];qno.textContent=`${cur+1} / ${QS.length}`;qtag.textContent=`Q${cur+1}`;qtext.textContent=q.text;prog.style.width=cur/QS.length*100+'%';back.style.visibility=cur?'visible':'hidden';opts.innerHTML=[q.A,q.B].map((x,i)=>`<button class="chip p-4 text-left font-black" onclick="pick(${i})"><span class="mr-2 text-2xl">${i?'🌙':'⚡'}</span>${x}</button>`).join('')}function pick(i){ans[cur]=i;if(cur<QS.length-1){cur++;render()}else{calc();quiz.classList.add('hide');pack.classList.remove('hide');pack.classList.add('grid');clearInterval(timer)}}function prev(){if(cur){cur--;render()}}function calc(){let s={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};QS.forEach((q,i)=>s[ans[i]?pair[q.a]:q.a]++);res=[s.E>=s.I?'E':'I',s.N>=s.S?'N':'S',s.T>=s.F?'T':'F',s.J>=s.P?'J':'P'].join('');dims=[['外向 E','内向 I',s.E,s.I],['直觉 N','感觉 S',s.N,s.S],['思维 T','情感 F',s.T,s.F],['判断 J','感知 P',s.J,s.P]]}function openCard(){pack.classList.add('hide');pack.classList.remove('grid');show(res,dims);confetti()}function rarity(p){return p<2.5?'SSR':p<5?'SR':p<9?'R':'经典'}function show(c,d){let t=TYPES[c],r=rarity(t[8]);home.classList.add('hide');quiz.classList.add('hide');pack.classList.add('hide');result.classList.remove('hide');rarity.textContent=r;rtype.textContent=c;ricon.textContent=t[1];rname.textContent=t[0];rcode.textContent='「'+t[2]+'」';rdesc.textContent=t[3];power.textContent=t[4];jobs.innerHTML=t[5].split('、').map(j=>`<span class="rounded-full bg-[#fff1da] px-3 py-2 text-sm font-bold text-[#ff9505]">${j}</span>`).join('');soul.innerHTML=`<div class="chip p-4 text-center"><div class="text-3xl">${t[6].split(' ')[0]}</div><b>本命元素</b><p>${t[6].split(' ')[1]||''}</p></div><div class="chip p-4 text-center"><div class="text-3xl">${t[7].split(' ')[0]}</div><b>灵魂动物</b><p>${t[7].split(' ')[1]||''}</p></div><div class="chip p-4 text-center"><div class="text-3xl">🎴</div><b>稀有度</b><p>${r} · ${t[8]}%</p></div>`;dims.innerHTML=(d||[]).map(x=>{let a=x[2],b=x[3],p=Math.round(Math.max(a,b)/(a+b)*100),w=a>=b?x[0]:x[1];return`<div><div class="mb-2 flex justify-between text-sm font-black"><span>${w}</span><span class="text-[#ff9505]">${p}%</span></div><div class="bar"><div class="fill" style="width:${p}%"></div></div><div class="mt-1 flex justify-between text-xs text-[#858b9f]"><span>${x[0]}</span><span>${x[1]}</span></div></div>`}).join('')||'<p class="text-[#858b9f]">完成测试后显示四维强度。</p>';scrollTo(0,0)}function share(){let u=location.href.split('#')[0];let txt=`我的MBTI人格卡是 ${res||'隐藏款'}，你也来测：${u}`;if(navigator.share)navigator.share({title:'MBTI 16型人格测试',text:txt,url:u}).catch(()=>{});else navigator.clipboard.writeText(txt).then(()=>alert('链接已复制'))}function home(){result.classList.add('hide');home.classList.remove('hide');scrollTo(0,0)}function confetti(){let c=$('confetti'),x=c.getContext('2d'),w=c.width=innerWidth,h=c.height=innerHeight,p=Array.from({length:120},()=>({x:Math.random()*w,y:-20-Math.random()*h,v:2+Math.random()*4,s:4+Math.random()*7,r:Math.random()*6,col:['#ffb627','#ff9505','#38b6ff','#2ec4b6','#ff6b6b'][Math.floor(Math.random()*5)]})),f=0;(function draw(){x.clearRect(0,0,w,h);p.forEach(o=>{o.y+=o.v;o.r+=.1;x.save();x.translate(o.x,o.y);x.rotate(o.r);x.fillStyle=o.col;x.globalAlpha=Math.max(0,1-f/160);x.fillRect(-o.s/2,-o.s/2,o.s,o.s);x.restore()});if(f++<160)requestAnimationFrame(draw);else x.clearRect(0,0,w,h)})()}init()</script></body></html>
