{E:'I',I:'E',S:'N',N:'S',T:'F',F:'T',J:'P',P:'J'};function ctx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx}function blip(f,d=.08,v=.12,t='square',delay=0){if(!soundOn)return;try{const c=ctx(),o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.setValueAtTime(f,c.currentTime+delay);g.gain.setValueAtTime(v,c.currentTime+delay);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+delay+d);o.connect(g);g.connect(c.destination);o.start(c.currentTime+delay);o.stop(c.currentTime+delay+d+.02)}catch(e){}}const SFX={start(){[523,659,784].forEach((f,i)=>blip(f,.08,.14,'square',i*.07))},pick(){blip(660,.05);blip(880,.07,.11,'square',.05)},back(){blip(440,.05);blip(330,.07,.1,'square',.05)},win(){[523,659,784,1047].forEach((f,i)=>blip(f,i===3?.28:.08,.16,'square',i*.08))},type(){blip(988,.05,.12);blip(1319,.16,.1,'square',.05)}};function toggleSound(){soundOn=!soundOn;localStorage.mbti_sound=soundOn?'on':'off';soundBtn.textContent=soundOn?'🔊':'🔇';if(soundOn)SFX.type()}function init(){soundBtn.textContent=soundOn?'🔊':'🔇';typeGrid.innerHTML=Object.entries(TYPES).map(([c,t])=>`<button class="chip" style="padding:15px;text-align:center" onclick="peek('${c}')"><div style="font-size:30px">${t[1]}</div><b>${c}</b><p style="margin:3px 0 0;color:var(--soft);font-size:12px">${t[0]}</p></button>`).join('')}function shuffle(a){return [...a].sort(()=>Math.random()-.5)}function build(){return shuffle(Object.entries(POOL).flatMap(([d,arr])=>shuffle(arr).map(x=>{let a=d[0],q={a,text:x[0],A:x[1],B:x[2]};if(Math.random()<.5){q.A=x[2];q.B=x[1];q.a=opp[a]}return q})))}function start(){SFX.start();QS=build();cur=0;ans=[];sec=0;clearInterval(tick);timerText.textContent='0:00';tick=setInterval(()=>{sec++;timerText.textContent=Math.floor(sec/60)+':'+String(sec%60).padStart(2,'0')},1000);home.classList.add('hide');result.classList.add('hide');pack.classList.add('hide');quiz.classList.remove('hide');render();setTimeout(()=>quiz.scrollIntoView({behavior:'smooth',block:'start'}),60)}function render(){let q=QS[cur];qcard.classList.remove('pop');void qcard.offsetWidth;qcard.classList.add('pop');qno.textContent=`${cur+1} / ${QS.length}`;qtag.textContent=`Q${cur+1}`;qtext.textContent=q.text;prog.style.width=cur/QS.length*100+'%';back.style.visibility=cur?'visible':'hidden';opts.innerHTML=[q.A,q.B].map((x,i)=>`<button class="chip" style="padding:16px;text-align:left;font-weight:900" onclick="pick(${i})"><span style="font-size:24px;margin-right:8px">${i?'🌙':'⚡'}</span>${x}</button>`).join('')}function pick(i){SFX.pick();ans[cur]=i;if(cur<QS.length-1){cur++;setTimeout(render,120)}else{calc();quiz.classList.add('hide');pack.classList.remove('hide');pack.style.display='grid';clearInterval(tick);SFX.win();setTimeout(()=>pack.scrollIntoView({behavior:'smooth',block:'center'}),60)}}function prev(){if(cur){SFX.back();cur--;render()}}function calc(){let s={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};QS.forEach((q,i)=>s[ans[i]?opp[q.a]:q.a]++);res=[s.E>=s.I?'E':'I',s.N>=s.S?'N':'S',s.T>=s.F?'T':'F',s.J>=s.P?'J':'P'].join('');dimData=[['外向 E','内向 I',s.E,s.I],['直觉 N','感觉 S',s.N,s.S],['思维 T','情感 F',s.T,s.F],['判断 J','感知 P',s.J,s.P]]}function openCard(){SFX.win();pack.classList.add('hide');pack.style.display='';show(res,dimData,true);confetti()}function peek(c){SFX.type();show(c,null,false)}function rarity(p){return p<2.5?'SSR':p<5?'SR':p<9?'R':'经典'}function show(c,d,party){let t=TYPES[c],r=rarity(t[8]);home.classList.add('hide');quiz.classList.add('hide');pack.classList.add('hide');result.classList.remove('hide');rarityBadge.textContent=r;rtype.textContent=c;ricon.textContent=t[1];rname.textContent=t[0];rcode.textContent='「'+t[2]+'」';rdesc.textContent=t[3];power.textContent=t[4];jobs.innerHTML=t[5].split('、').map(j=>`<span style="border-radius:999px;background:#fff1da;color:var(--deep);padding:7px 10px;font-size:14px;font-weight:800">${j}</span>`).join('');soul.innerHTML=`<div class="chip" style="padding:15px;text-align:center"><div style="font-size:30px">${t[6].split(' ')[0]}</div><b>本命元素</b><p>${t[6].split(' ')[1]||''}</p></div><div class="chip" style="padding:15px;text-align:center"><div style="font-size:30px">${t[7].split(' ')[0]}</div><b>灵魂动物</b><p>${t[7].split(' ')[1]||''}</p></div><div class="chip" style="padding:15px;text-align:center"><div style="font-size:30px">🎴</div><b>稀有度</b><p>${r} · ${t[8]}%</p></div>`;dimBox.innerHTML=(d||[]).map(x=>{let a=x[2],b=x[3],p=Math.round(Math.max(a,b)/(a+b)*100),w=a>=b?x[0]:x[1];return`<div><div style="display:flex;justify-content:space-between;font-weight:900;font-size:14px"><span>${w}</span><span style="color:var(--deep)">${p}%</span></div><div class="bar"><div class="fill" style="width:${p}%"></div></div><div style="display:flex;justify-content:space-between;color:var(--soft);font-size:12px"><span>${x[0]}</span><span>${x[1]}</span></div></div>`}).join('')||'<p style="color:var(--soft)">完成测试后显示四维强度；这里先预览该人格类型。</p>';drawRadar(t[9]);setTimeout(()=>result.scrollIntoView({behavior:'smooth',block:'start'}),60);if(party)confetti()}function drawRadar(vals){const cv=radarCanvas,c=cv.getContext('2d'),W=cv.width,H=cv.height,cx=W/2,cy=H/2+20,R=190,labels=['思辨','社交','共情','行动','秩序','想象'];c.clearRect(0,0,W,H);c.lineWidth=2;c.strokeStyle='#efe9da';for(let r=1;r<=4;r++){c.beginPath();for(let i=0;i<6;i++){let a=-Math.PI/2+i*Math.PI/3,x=cx+R*r/4*Math.cos(a),y=cy+R*r/4*Math.sin(a);i?c.lineTo(x,y):c.moveTo(x,y)}c.closePath();c.stroke()}for(let i=0;i<6;i++){let a=-Math.PI/2+i*Math.PI/3;c.beginPath();c.moveTo(cx,cy);c.lineTo(cx+R*Math.cos(a),cy+R*Math.sin(a));c.stroke()}c.beginPath();vals.forEach((v,i)=>{let a=-Math.PI/2+i*Math.PI/3,r=R*v/100,x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);i?c.lineTo(x,y):c.moveTo(x,y)});c.closePath();let g=c.createLinearGradient(120,80,520,480);g.addColorStop(0,'rgba(255,182,39,.48)');g.addColorStop(1,'rgba(255,107,107,.35)');c.fillStyle=g;c.fill();c.strokeStyle='#ff9505';c.lineWidth=6;c.stroke();c.fillStyle='#ff9505';vals.forEach((v,i)=>{let a=-Math.PI/2+i*Math.PI/3,r=R*v/100;c.beginPath();c.arc(cx+r*Math.cos(a),cy+r*Math.sin(a),7,0,7);c.fill()});c.fillStyle='#5a5f73';c.font='700 24px -apple-system,sans-serif';c.textAlign='center';c.textBaseline='middle';labels.forEach((l,i)=>{let a=-Math.PI/2+i*Math.PI/3;c.fillText(l,cx+(R+46)*Math.cos(a),cy+(R+46)*Math.sin(a))})}function share(){let u=location.href.split('#')[0];let txt=`我的MBTI人格卡是 ${res||rtype.textContent}，你也来测：${u}`;if(navigator.share)navigator.share({title:'MBTI 16型人格测试',text:txt,url:u}).catch(()=>{});else navigator.clipboard.writeText(txt).then(()=>alert('链接已复制'))}function goHome(){result.classList.add('hide');home.classList.remove('hide');scrollTo({top:0,behavior:'smooth'})}function confetti(){let c=confetti,x=c.getContext('2d'),w=c.width=innerWidth,h=c.height=innerHeight,p=Array.from({length:140},()=>({x:Math.random()*w,y:-20-Math.random()*h,v:2+Math.random()*4,s:4+Math.random()*7,r:Math.random()*6,col:['#ffb627','#ff9505','#38b6ff','#2ec4b6','#ff6b6b'][Math.floor(Math.random()*5)]})),f=0;(function draw(){x.clearRect(0,0,w,h);p.forEach(o=>{o.y+=o.v;o.r+=.1;x.save();x.translate(o.x,o.y);x.rotate(o.r);x.fillStyle=o.col;x.globalAlpha=Math.max(0,1-f/160);x.fillRect(-o.s/2,-o.s/2,o.s,o.s);x.restore()});if(f++<160)requestAnimationFrame(draw);else x.clearRect(0,0,w,h)})()}init()</script></body></html>
